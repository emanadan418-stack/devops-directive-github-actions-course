name: Run Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [node, python, go]

    steps:
      - uses: actions/checkout@v4

      # 🔧 Setup Node
      - name: Setup Node
        if: matrix.service == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 🔧 Setup Python
      - name: Setup Python
        if: matrix.service == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      # 🔧 Setup Go
      - name: Setup Go
        if: matrix.service == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: 1.22

      # 🚀 Run Tests
      - name: Run Tests
        run: echo "Running tests for ${{ matrix.service }}"