name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - services/go/api-golang
          - services/node/api-node
          - services/python/load-generator-python
          - services/react/client-react

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image
        working-directory: capstone/${{ matrix.service }}
        run: |
          docker build \
          -t ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }} .

      - name: Push Image
        run: |
          docker push ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}